name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build
        run: |
          xcodebuild \
            -project SaturdayQuiz.xcodeproj \
            -scheme SaturdayQuiz \
            -configuration Debug \
            -destination 'generic/platform=tvOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Test
        run: |
          xcodebuild \
            -project SaturdayQuiz.xcodeproj \
            -scheme SaturdayQuiz \
            -destination 'platform=tvOS Simulator,name=Apple TV' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            test
